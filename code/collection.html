function extractTechnicalIds(text){
  const ids=[];
  const collect=body=>{
    String(body||'').replace(/<[^>]*>/g,'').replace(/[A-Z]{1,5}\d{6}/g,id=>ids.push(id));
  };
  String(text||'')
    .replace(/\[\s*ID(?:\s+carte)?\s*=([\s\S]*?)\]/gi,(_,body)=>{collect(body);return '';})
    .replace(/<(?:em|i|span|strong)[^>]*>\s*ID(?:\s+carte)?\s*=\s*([\s\S]*?)<\/(?:em|i|span|strong)>/gi,(_,body)=>{collect(body);return '';});
  return [...new Set(ids)];
}
function stripTechnicalIdsForDisplay(text){
  return String(text||'')
    .replace(/\s*<(?:em|i|span|strong)[^>]*>\s*ID(?:\s+carte)?\s*=\s*[\s\S]*?<\/(?:em|i|span|strong)>\s*/gi,' ')
    .replace(/\s*[\[(]\s*ID(?:\s+carte)?\s*=\s*[\s\S]*?[\])]/gi,' ')
    .replace(/\s{2,}/g,' ')
    .replace(/\s+([,.;:!?])/g,'$1')
    .trim();
}

function formatKnownKeywordMarkersForDisplay(text){
  return String(text||'').replace(/\[([^\]]+)\]/g,(match,rawLabel)=>{
    const label=String(rawLabel||'').trim();
    if(KEYWORD_DEFS[label]&&!RESOURCE_KEYWORDS.has(label)){
      return `<strong class="card-keyword" data-keyword="${label}">${label}</strong>`;
    }
    return match;
  });
}

function applyDisplayTextOverrides(cardId,text){
  let out=String(text||'');
  (DISPLAY_TEXT_OVERRIDES[cardId]||[]).forEach(([from,to])=>{out=out.replace(from,to);});
  return out;
}

function hasMechanicalKeyword(c){
  return (c.kw||[]).some(kw=>KEYWORD_DEFS[kw]&&!RESOURCE_KEYWORDS.has(kw));
}

function isLoreOnly(c){
  if(!c)return false;
  if(SOURCE_LORE_IDS_20260622.has(c.id))return !!String(c.desc||'').trim();
  if(SOURCE_MECHANICAL_IDS_20260622.has(c.id)||SOURCE_MECHANICAL_CONTROL_IDS_20260622.has(c.id))return false;
  const detail=String(c?.sourceDetail??c?.detail??'').trim();
  return (detail===''||detail==='/')&&!!String(c?.desc||'').trim();
}

function stripGlobalLoreMarkupForDisplay(text){
  return String(text||'').trim().replace(/^<(?:i|em)(?:\s[^>]*)?>([\s\S]*)<\/(?:i|em)>$/i,'$1');
}

function displayCardText(c,{preferDetail=false}={}){
  let text=preferDetail&&c.useDetail&&c.detail?c.detail:c.desc;
  text=stripTechnicalIdsForDisplay(applyDisplayTextOverrides(c.id,text));
  text=formatPlayerFacingCardText(text,c);
  if(isLoreOnly(c)&&!/^<(?:i|em)\b/i.test(text))return`<i>${text}</i>`;
  return isLoreOnly(c)?text:stripGlobalLoreMarkupForDisplay(text);
}

function auditLoreRendering(){
  const cards=CARDS.map(c=>({
    id:c.id,
    rawDetail:String(c.sourceDetail??c.detail??''),
    status:isLoreOnly(c)?'lore':'mechanical',
    renderedStyle:isLoreOnly(c)?'italic':'normal'
  }));
  const expectedLore=cards.filter(c=>c.status==='lore').length;
  const expectedMechanical=cards.filter(c=>c.status==='mechanical').length;
  return{
    summary:{
      total:cards.length,
      expectedLore,
      expectedMechanical,
      renderedItalic:cards.filter(c=>c.renderedStyle==='italic').length,
      renderedNormal:cards.filter(c=>c.renderedStyle==='normal').length,
      divergences:[]
    },
    cards
  };
}

function normalizedConditionComparable(value){
  return String(value||'')
    .replace(/<[^>]*>/g,' ')
    .replace(/Condition[^a-zA-Z0-9]{0,24}[:：]/gi,' ')
    .replace(/[.,;:!?]/g,' ')
    .replace(/\s+/g,' ')
    .trim()
    .toLowerCase();
}
function hasExplicitInvocationCondition(c){
  if(!c||!c.cond)return false;
  if(c.type==='Approvisionnement')return true;
  const conditionText=normalizedConditionComparable(c.cond);
  if(!conditionText)return false;
  const descriptionText=normalizedConditionComparable(c.desc||'');
  if(descriptionText&&descriptionText.includes(conditionText))return false;
  return true;
}
function displayConditionText(c){
  if(!hasExplicitInvocationCondition(c))return '';
  return formatPlayerFacingCardText(stripTechnicalIdsForDisplay(applyDisplayTextOverrides(c.id,c.cond||'')),c);
}

/* Donnees derivees Collection : conditions explicites, rich text et cartes liees. */
function hydrateCollectionDerivedData(){
  const byId=new Map(CARDS.map(c=>[c.id,c]));
  CARDS.forEach(c=>{
    const ids=[...new Set([...(c.related||[]), ...extractTechnicalIds(c.desc), ...extractTechnicalIds(c.detail), ...extractTechnicalIds(c.cond)])]
      .filter(id=>byId.has(id)&&id!==c.id);
    if(ids.length)c.related=ids;
  });
  const groupRx=/\u00ab\s*([^\u00bb]+?)\s*\u00bb\s*\[\s*ID\s*=([\s\S]*?)\]/gi;
  CARDS.forEach(c=>{
    const fields=[c.desc,c.detail,c.cond].filter(Boolean).join(' ');
    fields.replace(groupRx,(_,alias,body)=>{
      const ids=(String(body).replace(/<[^>]*>/g,'').match(/[A-Z]{1,5}\d{6}/g)||[]);
      ids.forEach(id=>{const target=byId.get(id);if(target){target.searchAliases||=[];target.searchAliases.push(alias);}});
      return '';
    });
  });
}
function cardSearchIndex(c){
  const relatedNames=(c.related||[]).map(id=>CARDS.find(x=>x.id===id)?.name||'').join(' ');
  const visibleDesc=stripTechnicalIdsForDisplay(`${c.desc||''} ${c.detail||''} ${c.cond||''}`);
  return normalizeSearchText([c.id,c.name,c.type,c.faction,normalizeFactionKey(c.faction),visibleDesc,(c.kw||[]).join(' '),relatedNames,(c.searchAliases||[]).join(' ')].join(' '));
}


function getFc(c){
  const key=normalizeFactionKey(c.faction);
  const m={'elfe-des-bois':'edb','humain':'hum','orc':'orc','mort-vivant':'mvs','elfe-noir':'edn','elfe-de-glace':'edg','nain':'nain','troll':'trl','bete':'bet','gobelin':'gob','non-affilie':'div'};
  if(c.type==='Approvisionnement')return'appro';
  if(c.type==='Avatar')return'avatar';
  if(c.type==='Serviteur (pseudo avatar)')return'hum';
  if(c.type==='Sort')return m[key]||'sort';
  return m[key]||'sort';
}

function collectionFactionColor(c){

/* ── RESSOURCES ── */
const COLLECTION_RESOURCE_ICONS={
  aria:'IC00000ARI',bois:'IC00000BOI',fer:'IC00000FER',lenya:'IC00000LNY',
  nourriture:'IC00000NRT',pierre:'IC00000PIE',selene:'IC00000SLN',soul:'IC00000AME'
};

function renderCollectionCostDef(c,pfx){
  const def=COLLECTION_COST_DEFINITIONS[c.id];
  if(!def)return null;
  const sz=pfx==='modal'?'modal-res':'ccard-res';
  const sp=pfx==='modal'?'modal-res-sep':'ccard-res-sep';
  const rendered=[];
  (def.groups||[]).forEach(group=>{
    const resources=(group.resources||[]).map(r=>{
      const icon=COLLECTION_RESOURCE_ICONS[r.key]||'IC00000RDM';
      if(!COLLECTION_RESOURCE_ICONS[r.key])console.warn(`[collection] Ressource inconnue pour ${c.id}: ${r.key}`);
      const amount=r.explicit&&Number(r.amount)>1?`<span>${r.amount}</span>`:'';
      return `<div class="${sz}"><img src="${GH}/icones/${icon}.png" alt="">${amount}</div>`;
    }).filter(Boolean);
    if(!resources.length)return;
    if(rendered.length&&group.op)rendered.push(`<span class="${sp}">${String(group.op).toUpperCase()}</span>`);
    rendered.push(resources.join(`<span class="${sp}">OU</span>`));
  });
  if(rendered.length){
    if(Number(def.total)>0)rendered.push(`<span class="${sp}">&ge;&nbsp;${def.total}</span>`);
    return rendered.join('');
  }
  const rdm=`${GH}/icones/IC00000RDM.png`;
  return`<div class="${sz}"><img src="${rdm}" alt=""><span>${def.total||0}</span></div>`;
}

function validResourceGroup(group){
  return Array.isArray(group)&&group.length>0;
}

function renderResHTML(c,pfx){
  const sz=pfx==='modal'?'modal-res':'ccard-res';
  const sp=pfx==='modal'?'modal-res-sep':'ccard-res-sep';
  const rdm=`${GH}/icones/IC00000RDM.png`;
  if(c.costLabel)return`<span class="${pfx==='modal'?'modal-cost-label':'ccard-cost-label'}">${c.costLabel}</span>`;
  if(c.hideCost)return'';
  if(c.type==='Approvisionnement'){
    if(!c.prod||!c.prod.length)return'';
    return c.prod.map(r=>`<div class="${sz}"><img src="${r.i}" alt=""><span>${r.n}</span></div>`).join('');
  }
  const structured=renderCollectionCostDef(c,pfx);
  if(structured)return structured;
  if(c.id==='S000008')return`<span style="font-family:'Cinzel',serif;font-size:${pfx==='modal'?'9':'7'}px;color:var(--gold);letter-spacing:0.1em;">INVOCATION</span>`;
  if(!c.res||!c.res.length){
    return`<div class="${sz}"><img src="${rdm}" alt=""><span>${c.cost||0}</span></div>`;
  }
  const groups=[
    {res:c.res,sep:c.rs},{res:c.res2,sep:c.rs2},{res:c.res3,sep:c.rs3},
    {res:c.res4,sep:c.rs4},{res:c.res5,sep:c.rs5}
  ].filter(g=>validResourceGroup(g.res));
  return groups.map((g,i)=>{
    const res=g.res.map(r=>`<div class="${sz}"><img src="${r.i}" alt=""><span>${r.n}</span></div>`).join('');
    const nextSep=i<groups.length-1&&g.sep?`<span class="${sp}">${String(g.sep).toUpperCase()}</span>`:'';
    return res+nextSep;
  }).join('');
}

/* ── RENDU MINI-CARTE ── */
function normalizeResourceHtmlSignature(html){
  return String(html || '')
    .replace(/\s+/g,' ')
    .replace(/class="[^"]*"/g,'class=""')
    .replace(/style="[^"]*"/g,'style=""')
    .replace(/ccard-res|modal-res/g,'res')
    .replace(/ccard-res-sep|modal-res-sep/g,'sep')
    .trim();
}

function estimateResourceLineCount(card, html){
  if(!html)return 0;
  const resourceCount=(html.match(/class="(?:ccard-res|modal-res)"/g)||[]).length;
  const connectorCount=(html.match(/(?:OU|\+|&ge;|≥)/g)||[]).length;
  const visualWeight=resourceCount+Math.ceil(connectorCount/2);
  if(card?.type==='Approvisionnement'){
    if(resourceCount<=2)return 1;
    if(resourceCount<=7)return 2;
    return 3;
  }
  if(visualWeight<=3)return 1;
  if(visualWeight<=8)return 2;
  return 3;
}

function renderCardResourceGroups(c,{context='normal'}={}){
  const pfx=context==='modal'||context==='preview'?'modal':'ccard';
  const html=renderResHTML(c,pfx);
  const kind=collectionCardExpectedResourceKind(c);
  const lineCount=estimateResourceLineCount(c,html);
  const resourceClass=pfx==='modal'?'modal-res':'ccard-res';
  const resourceCount=(html.match(new RegExp(`class="${resourceClass}"`,'g'))||[]).length;
  const connectorCount=(html.match(/(?:OU|\+|&ge;|≥)/g)||[]).length;
  return {
    html,
    kind,
    lineCount,
    resourceCount,
    connectorCount,
    signature:normalizeResourceHtmlSignature(html),
    expectedCost:kind==='cost',
    expectedProduction:kind==='production'
  };
}

function renderCard(c){
  const fc=getFc(c);
  const factionColor=collectionFactionColor(c);
  const isAP=c.type==='Approvisionnement',isST=c.type==='Sort';
  const visibleType=c.displayType||c.type;
  const atk=c.atk!=null?`<div class="ccard-stat-atk"><div class="ccard-stat-b"><img src="${GH}/icones/IC00000ATK.png" alt=""><span>${c.atk}</span></div></div>`:'';
  const pdv=c.pdv!=null?`<div class="ccard-stat-pdv"><div class="ccard-stat-b"><img src="${GH}/icones/IC00000PDV.png" alt=""><span>${c.pdv}</span></div></div>`:'';
  const ficoUrl=factionIconUrl(c);
  const fi=ficoUrl?`<img class="ccard-faction-ico" src="${ficoUrl}" alt="">`:'';
  const tb=(isST||isAP)?`<div class="ccard-type-badge"><span>${visibleType}</span></div>`:'';
  const isAV=(c.type==='Avatar');
  const resource=renderCardResourceGroups(c,{context:'normal'});
  const resourceZone=isAV?'':`<div class="ccard-resource-footer ccard-cost-z resource-lines-${resource.lineCount}" data-resource-lines="${resource.lineCount}" data-resource-count="${resource.resourceCount}" data-connector-count="${resource.connectorCount}" data-card-id="${c.id}" data-resource-kind="${resource.kind || ''}" data-resource-signature="${encodeURIComponent(resource.signature)}"><div class="ccard-resource-row collection-cost-flow">${resource.html}</div></div>`;

  let qtyBadge='';
  if(c.maxOwned>0){
    qtyBadge=`<div class="ccard-qty">${c.qty}/${c.maxOwned}</div>`;
  }

  return`<article class="ccard${c.owned?'':' missing'}" data-card-id="${c.id}" data-id="${c.id}" style="--card-faction-color:${factionColor};--card-kw:${factionColor}">${qtyBadge}<div class="ccard-frame ${fc}-card"><div class="ccard-border"></div><div class="ccard-liseré"></div><div class="ccard-inner"><div class="ccard-art-z"><img class="ccard-art" src="${c.img}" alt="${c.name}" onerror="this.style.opacity='0.1'">${fi}${tb}${atk}${pdv}</div><div class="ccard-name-b"><span class="ccard-name">${c.name}</span></div><div class="ccard-desc-z"><div class="ccard-desc-inner"><p>${displayCardText(c)}</p></div></div>${resourceZone}</div></div><div class="ccard-type">${visibleType}</div></article>`;
}

/* ── FILTRAGE ── */
function typeMatches(c){
  if(c.type==='Avatar')return state.perso.has('Avatar');
  // Les pseudo-avatars (Mage du Cercle) sont filtrés comme des serviteurs ordinaires
  if(c.type==='Serviteur (pseudo avatar)')return state.types.has('Serviteur');
  return state.types.has(c.type);
}
function getFiltered(){
  return CARDS.filter(c=>{
    if(c.hidden)return false;
    if(state.possession==='owned'&&!c.owned)return false;
    if(state.possession==='missing'&&c.owned)return false;
    if(!typeMatches(c))return false;
    if(c.faction&&c.faction!=='/'&&!state.factions.has(normalizeFactionKey(c.faction)))return false;
    if(state.costMin!==''&&(c.cost||0)<parseInt(state.costMin))return false;
    if(state.costMax!==''&&(c.cost||0)>parseInt(state.costMax))return false;
    if(state.kw&&!cardSearchIndex(c).includes(normalizeSearchText(state.kw)))return false;
    if(state.search){const s=normalizeSearchText(state.search);if(!cardSearchIndex(c).includes(s))return false;}
    return true;
  });
}
function getSorted(arr){
  return[...arr].sort((a,b)=>{
    if(state.sort==='alpha')return a.name.localeCompare(b.name,'fr');
    if(state.sort==='alpha-cost'){const n=a.name.localeCompare(b.name,'fr');return n||(a.cost||0)-(b.cost||0);}
    if(state.sort==='faction')return(a.faction||'').localeCompare(b.faction||'','fr');
    if(state.sort==='cost-asc')return(a.cost||0)-(b.cost||0);
    if(state.sort==='cost-desc')return(b.cost||0)-(a.cost||0);
    return 0;
  });
}

/* ── SUGGESTIONS ── */
function collectionCardExpectedResourceKind(cardData){
  if(!cardData||cardData.type==='Avatar'||cardData.hideCost)return null;
  return cardData.type==='Approvisionnement'?'production':'cost';
}

function compareCollectionNormalAndPreview(cardId){
  const cardData=CARDS.find(c=>c.id===cardId);
  if(!cardData)return{cardId,exists:false,valid:false};
  const normal=renderCardResourceGroups(cardData,{context:'normal'});
  const preview=renderCardResourceGroups(cardData,{context:'preview'});
  return{
    cardId,
    exists:true,
    expectedKind:collectionCardExpectedResourceKind(cardData),
    normalRenderedCost:normal.expectedCost?normal.html:'',
    previewRenderedCost:preview.expectedCost?preview.html:'',
    normalRenderedProduction:normal.expectedProduction?normal.html:'',
    previewRenderedProduction:preview.expectedProduction?preview.html:'',
    normalResourceLineCount:normal.lineCount,
    previewResourceLineCount:preview.lineCount,
    normalDomStructure:normal.signature,
    previewDomStructure:preview.signature,
    structureParity:normal.signature===preview.signature,
    lineCountParity:normal.lineCount===preview.lineCount,
    divergences:[
      ...(normal.signature===preview.signature?[]:['resource-structure']),
      ...(normal.lineCount===preview.lineCount?[]:['resource-line-count'])
    ],
    themeParity:true,
    valid:normal.signature===preview.signature&&normal.lineCount===preview.lineCount
  };
}

function auditCollectionCardResources(cardId){
  const card=Array.from(document.querySelectorAll('.ccard[data-id]')).find(el=>el.dataset.id===cardId);
  const cardData=CARDS.find(c=>c.id===cardId);
  const expected=cardData?renderCardResourceGroups(cardData,{context:'normal'}):null;
  const previewExpected=cardData?renderCardResourceGroups(cardData,{context:'preview'}):null;
  const parity=compareCollectionNormalAndPreview(cardId);
  const resourceNodes=Array.from(document.querySelectorAll(`.ccard-resource-footer[data-card-id="${cardId}"],.ccard-cost-z[data-card-id="${cardId}"]`));
  const insideResourceNodes=card?resourceNodes.filter(node=>card.contains(node)):[];
  const detachedResourceNodes=resourceNodes.filter(node=>!card||!card.contains(node));
  const expectedKind=collectionCardExpectedResourceKind(cardData);
  const expectedCost=expectedKind==='cost';
  const expectedProduction=expectedKind==='production';
  const footer=insideResourceNodes[0]||null;
  const cardFrame=card?.querySelector('.ccard-frame')||null;
  const descNode=card?.querySelector('.ccard-desc-z')||null;
  const typeNode=card?.querySelector('.ccard-type')||null;
  const normalTextNode=card?.querySelector('.ccard-desc-inner p')||null;
  const modalTextNode=document.querySelector(`.modal-card[data-id="${cardId}"] .modal-desc,.modal-card[data-id="${cardId}"] .modal-desc p`);
  const normalTextColor=normalTextNode?getComputedStyle(normalTextNode).color:null;
  const previewTextColor=modalTextNode?getComputedStyle(modalTextNode).color:null;
  const rectObj=el=>{
    if(!el)return null;
    const r=el.getBoundingClientRect();
    return {x:Math.round(r.x),y:Math.round(r.y),width:Math.round(r.width),height:Math.round(r.height),top:Math.round(r.top),bottom:Math.round(r.bottom),left:Math.round(r.left),right:Math.round(r.right)};
  };
  const styleObj=el=>{
    if(!el)return null;
    const s=getComputedStyle(el);
    return{display:s.display,gridTemplateRows:s.gridTemplateRows,gridTemplateColumns:s.gridTemplateColumns,flexDirection:s.flexDirection,alignItems:s.alignItems,justifyContent:s.justifyContent,gap:s.gap,height:s.height,minHeight:s.minHeight,padding:s.padding,overflow:s.overflow};
  };
  const overflows=insideResourceNodes.map(node=>{
    const flow=node.querySelector('.ccard-resource-row,.collection-cost-flow')||node;
    const nodeRect=node.getBoundingClientRect();
    const flowRect=flow.getBoundingClientRect();
    const cardRect=card?.querySelector('.ccard-frame')?.getBoundingClientRect();
    return {
      widthOverflow:flowRect.width-nodeRect.width>1,
      heightOverflow:flowRect.height-nodeRect.height>1,
      nodeWidth:Math.round(nodeRect.width),
      nodeHeight:Math.round(nodeRect.height),
      flowWidth:Math.round(flowRect.width),
      flowHeight:Math.round(flowRect.height),
      distanceToCardBottom:cardRect?Math.round(cardRect.bottom-nodeRect.bottom):null,
      resourceKind:node.dataset.resourceKind||null
    };
  });
  const kindMismatch=expectedKind&&insideResourceNodes.some(node=>node.dataset.resourceKind!==expectedKind);
  const footerRect=footer?.getBoundingClientRect();
  const descRect=descNode?.getBoundingClientRect();
  const typeRect=typeNode?.getBoundingClientRect();
  const frameRect=cardFrame?.getBoundingClientRect();
  const flowRect=footer?.querySelector('.ccard-resource-row,.collection-cost-flow')?.getBoundingClientRect();
  const overlapsDescription=!!footerRect&&!!descRect&&footerRect.top<descRect.bottom-1;
  const overlapsTypeLabel=!!footerRect&&!!typeRect&&footerRect.bottom>typeRect.top-1;
  const centered=!!footerRect&&!!flowRect&&Math.abs((flowRect.left+flowRect.right)/2-(footerRect.left+footerRect.right)/2)<=2;
  const distanceToBottomBorder=frameRect&&footerRect?Math.round(frameRect.bottom-footerRect.bottom):null;
  const themeParityValid=!previewTextColor||!normalTextColor||previewTextColor===normalTextColor;
  const divergences=[
    ...(parity.structureParity?[]:['resource-structure']),
    ...(parity.lineCountParity?[]:['resource-line-count']),
    ...(!centered?['resource-centering']:[]),
    ...(overlapsDescription?['description-overlap']:[]),

  ];

    normalRenderedCost:expected?.expectedCost?expected.html:'',

    renderedCost:expectedCost&&insideResourceNodes.length===1&&!kindMismatch,

    normalRenderedProduction:expected?.expectedProduction?expected.html:'',
    previewRenderedProduction:previewExpected?.expectedProduction?previewExpected.html:'',
    renderedProduction:expectedProduction&&insideResourceNodes.length===1&&!kindMismatch,
    expectedKind,

    previewResourceLineCount:previewExpected?.lineCount || 0,
    footerCount:insideResourceNodes.length,
    resourceNodeCount:insideResourceNodes.length,
    costNodeCount:insideResourceNodes.length,
    detachedResourceNodeCount:detachedResourceNodes.length,
    detachedCostNodeCount:detachedResourceNodes.length,
    resourceKinds:insideResourceNodes.map(node=>node.dataset.resourceKind||null),
    overflows,
    kindMismatch,
    cardRect:rectObj(cardFrame),
    footerRect:rectObj(footer),
    normalFooterRect:rectObj(footer),
    previewFooterRect:null,
    descriptionRect:rectObj(descNode),
    typeLabelRect:rectObj(typeNode),
    distanceToBottomBorder,
    overlapsDescription,
    overlapsTypeLabel,
    centered,
    normalTextColor,
    previewTextColor,
    themeParityValid,
    structureParity:!!parity.structureParity,

    normalDomStructure:footer?.outerHTML||null,

function auditCollectionCostRendering(){
  const renderedIds=Array.from(document.querySelectorAll('.ccard[data-id]')).map(el=>el.dataset.id);
  const perCard=renderedIds.map(id=>auditCollectionCardResources(id));
  const missingResourceFooters=perCard.filter(r=>r.expectedKind&&r.resourceNodeCount!==1).map(r=>r.cardId);
  const duplicateResourceFooters=perCard.filter(r=>r.resourceNodeCount>1).map(r=>r.cardId);
  const detachedResourceFooters=perCard.filter(r=>r.detachedResourceNodeCount>0).map(r=>r.cardId);
  const overflowingResourceFooters=perCard.filter(r=>r.overflows.some(o=>o.widthOverflow||o.heightOverflow)).map(r=>r.cardId);
  const mismatchedCosts=perCard.filter(r=>r.expectedCost&&r.kindMismatch).map(r=>r.cardId);
  const mismatchedProductions=perCard.filter(r=>r.expectedProduction&&r.kindMismatch).map(r=>r.cardId);
  const expectedFooterMinHeight=r=>({0:26,1:30,2:42,3:54}[Math.min(3,Math.max(0,r.normalResourceLineCount||0))]||30);
  const footerHeightMismatches=perCard.filter(r=>r.footerRect&&r.footerRect.height+1<expectedFooterMinHeight(r)).map(r=>r.cardId);
  const misalignedResourceFooters=perCard.filter(r=>r.expectedKind&&(r.centered===false||r.overlapsDescription||r.overlapsTypeLabel)).map(r=>r.cardId);
  const textColorMismatches=perCard.filter(r=>!r.themeParityValid).map(r=>r.cardId);
  const resourceStructureMismatches=perCard.filter(r=>!r.structureParity).map(r=>r.cardId);
  const lineCountMismatches=perCard.filter(r=>!r.lineCountParity).map(r=>r.cardId);
  const normalRendererMismatches=[...new Set([...mismatchedCosts,...mismatchedProductions,...resourceStructureMismatches])];
  const previewRendererMismatches=resourceStructureMismatches;
  const overlappingTypeLabels=perCard.filter(r=>r.overlapsTypeLabel).map(r=>r.cardId);
  const overlappingDescriptions=perCard.filter(r=>r.overlapsDescription).map(r=>r.cardId);
  const detachedGroups=detachedResourceFooters;
  const excessiveVerticalGaps=perCard.filter(r=>r.distanceToBottomBorder!=null&&r.distanceToBottomBorder>10).map(r=>r.cardId);
  const affectedCardIds=[...new Set([...missingResourceFooters,...duplicateResourceFooters,...detachedResourceFooters,...overflowingResourceFooters,...misalignedResourceFooters,...footerHeightMismatches,...textColorMismatches,...mismatchedCosts,...mismatchedProductions,...resourceStructureMismatches,...lineCountMismatches,...overlappingDescriptions,...overlappingTypeLabels,...excessiveVerticalGaps])];
  return {
    totalCards:renderedIds.length,
    renderedCards:renderedIds.length,
    checkedCards:perCard.length,
    cardsWithExpectedCost:perCard.filter(r=>r.expectedCost).length,
    cardsWithExpectedProduction:perCard.filter(r=>r.expectedProduction).length,
    normalRendererMismatches,
    previewRendererMismatches,
    resourceStructureMismatches,
    lineCountMismatches,
    resourceLineCountMismatches:lineCountMismatches,
    missingResourceFooters,
    duplicateResourceFooters,
    detachedResourceFooters,
    overflowingResourceFooters,
    overlappingDescriptions,
    overlappingTypeLabels,
    detachedGroups,
    excessiveVerticalGaps,
    misalignedResourceFooters,
    footerHeightMismatches,
    textColorMismatches,
    mismatchedCosts,
    mismatchedProductions,
    affectedCardIds,
    missingCostCards:missingResourceFooters,
    duplicateCostCards:duplicateResourceFooters,
    detachedCostCards:detachedResourceFooters,
    overflowingCostCards:overflowingResourceFooters,
    valid:perCard.every(r=>r.valid),
    perCard
  };
}

function traceCollectionPointerEvent(event){
  const card=collectionCardFromEvent(event);

  recordCollectionDetailTrace({
    eventType:event.type,
    eventPhase:event.eventPhase,
    target:summarizeCollectionElement(event.target),
    sourceElement:summarizeCollectionElement(card),
    closestCardFound:true,
    cardIdAttribute:card.dataset.cardId,
    handlerBoundTo:'document capture',
    pointerDownReceived:event.type==='pointerdown' || currentCollectionDetailTrace.pointerDownReceived,
    pointerUpReceived:event.type==='pointerup' || currentCollectionDetailTrace.pointerUpReceived
  });
}

function handleCollectionCardClick(event){
  const card=collectionCardFromEvent(event);
  if(!card)return;
  if(isCollectionInteractiveClick(event))return;
  event.preventDefault();
  event.stopPropagation();
  const cardId=card.dataset.cardId;
  if(!currentCollectionDetailTrace || currentCollectionDetailTrace.cardId!==cardId){
    currentCollectionDetailTrace=createCollectionDetailTrace(cardId);
  }
  recordCollectionDetailTrace({
    eventType:event.type,
    eventPhase:event.eventPhase,
    target:summarizeCollectionElement(event.target),
    sourceElement:summarizeCollectionElement(card),
    closestCardFound:true,
    cardIdAttribute:cardId,
    handlerBoundTo:'document capture',
    clickReceived:true,
    listenerInvoked:true
  });
  openCollectionDetailById(cardId,{source:'grid-click',openEvent:event});
}

function auditKeywordContextParity(cardId){
  const c=CARDS.find(card=>card.id===cardId);
  if(!c)return{cardId,sourceFound:false,valid:false};
  const sourceText=[c.desc,c.detail].filter(Boolean).join('\n');
  const canonicalHtml=formatPlayerFacingCardText(sourceText,c);
  const collectionNormal=renderCard(c);
  openModal(cardId);
  const collectionDetail=document.getElementById('modalCard')?.innerHTML||'';
  const expectedKeywords=Array.from(canonicalHtml.matchAll(/data-keyword="([^"]+)"/g)).map(match=>match[1]);
  const analyze=html=>({
    renderedKeywords:Array.from(String(html).matchAll(/data-keyword="([^"]+)"/g)).map(match=>match[1]),
    visibleBracketedMarkers:Array.from(String(html).replace(/<[^>]+>/g,' ').matchAll(/\[[^\]]+\]/g)).map(match=>match[0]),
    visibleTechnicalIds:Array.from(String(html).replace(/<[^>]+>/g,' ').matchAll(/[A-Z]{1,5}\d{6}/g)).map(match=>match[0])
  });
  const normal=analyze(collectionNormal);
  const detail=analyze(collectionDetail);
  const keywordDifferences=[
    ...expectedKeywords.filter(keyword=>!normal.renderedKeywords.includes(keyword)).map(keyword=>`normal:${keyword}`),
    ...expectedKeywords.filter(keyword=>!detail.renderedKeywords.includes(keyword)).map(keyword=>`detail:${keyword}`)
  ];
  return{
    cardId,
    collectionNormal:normal,
    collectionDetail:detail,
    partHand:null,
    partBoard:null,
    partPreview:null,
    choiceWindow:null,
    semanticParity:keywordDifferences.length===0,
    styleParity:auditFactionColorPropagation(cardId,'collection-normal').valid&&auditFactionColorPropagation(cardId,'collection-detail').valid,
    valid:keywordDifferences.length===0&&!normal.visibleBracketedMarkers.length&&!detail.visibleBracketedMarkers.length
  };
}

/* ── RENDU ── */
function render(){
  const filtered=getFiltered(),sorted=getSorted(filtered);
  const total=Math.ceil(sorted.length/PER_PAGE);
  const grid=document.getElementById('cardsGrid');

  let page;
  if(state.showAll){
    page=sorted;
  } else {
    if(state.page>total&&total>0)state.page=total;
    if(state.page<1)state.page=1;
    page=sorted.slice((state.page-1)*PER_PAGE,state.page*PER_PAGE);
  }

  if(!page.length){
    grid.innerHTML='<div class="empty-state">Aucune carte ne correspond à votre recherche.</div>';
  } else {
    grid.innerHTML=page.map(renderCard).join('');
  }

  // Compteur
  const countable=c=>!c.hidden;
  const owned=CARDS.filter(c=>countable(c)&&c.owned).length;
  const tot=CARDS.filter(countable).length;
  document.getElementById('collectionCount').textContent=`${owned} / ${tot} cartes possédées`;

  // Pagination
  const nav=!state.showAll;
  document.getElementById('prevPage').disabled=!nav||state.page<=1;
  document.getElementById('nextPage').disabled=!nav||state.page>=total;
  document.getElementById('pageInfo').textContent=nav?`Page ${state.page} / ${Math.max(1,total)}`:'';
  document.getElementById('prevPage').style.opacity=nav?'':'0';
  document.getElementById('nextPage').style.opacity=nav?'':'0';

  // Bouton voir tout
  const btn=document.getElementById('btnShowAll');
  btn.textContent=state.showAll?'Voir par pages':'Voir toutes les cartes';
  btn.classList.toggle('active',state.showAll);

  // Points
  const dotsWrap=document.getElementById('pageDots');
  dotsWrap.innerHTML='';
  if(nav){
    for(let i=1;i<=Math.min(total,9);i++){
      const d=document.createElement('div');
      d.className='page-dot'+(i===state.page?' active':'');
      d.addEventListener('click',()=>{state.page=i;render();});
      dotsWrap.appendChild(d);
    }
  }
}

/* ── INIT ── */
function init(){
  // Factions
  const wrap=document.getElementById('factionFilters');
  FACTIONS.forEach(([key,label])=>{
    const btn=document.createElement('button');
    btn.className='ftog active';btn.dataset.filter='faction';btn.dataset.value=key;
    btn.textContent=label;
    btn.addEventListener('click',()=>{btn.classList.toggle('active');if(state.factions.has(key))state.factions.delete(key);else state.factions.add(key);state.page=1;render();});
    wrap.appendChild(btn);
  });

  // Possession
  document.querySelectorAll('[data-filter="possession"]').forEach(btn=>{
    btn.addEventListener('click',()=>{document.querySelectorAll('[data-filter="possession"]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.possession=btn.dataset.value;state.page=1;render();});
  });
  // Perso
  document.querySelectorAll('[data-filter="perso"]').forEach(btn=>{
    btn.addEventListener('click',()=>{btn.classList.toggle('active');const v=btn.dataset.value;if(state.perso.has(v))state.perso.delete(v);else state.perso.add(v);state.page=1;render();});
  });
  // Type
  document.querySelectorAll('[data-filter="type"]').forEach(btn=>{
    btn.addEventListener('click',()=>{btn.classList.toggle('active');const v=btn.dataset.value;if(state.types.has(v))state.types.delete(v);else state.types.add(v);state.page=1;render();});
  });
  document.getElementById('costMin').addEventListener('input',e=>{state.costMin=e.target.value;state.page=1;render();});
  document.getElementById('costMax').addEventListener('input',e=>{state.costMax=e.target.value;state.page=1;render();});
  document.getElementById('keywordFilter').addEventListener('input',e=>{state.kw=e.target.value.toLowerCase();state.page=1;render();});
  document.getElementById('sortSelect').addEventListener('change',e=>{state.sort=e.target.value;render();});

  // Bouton voir tout
  document.getElementById('btnShowAll').addEventListener('click',()=>{state.showAll=!state.showAll;render();});

  document.getElementById('btnReset').addEventListener('click',()=>{
    state={possession:'all',perso:new Set(['Avatar']),types:new Set(['Serviteur','Sort','Approvisionnement']),factions:new Set(FACTIONS.map(([key])=>key)),costMin:'',costMax:'',kw:'',sort:'alpha-cost',search:'',page:1,showAll:false};
    document.querySelectorAll('.ftog').forEach(b=>b.classList.add('active'));
    document.querySelectorAll('[data-filter="possession"]').forEach(b=>b.classList.remove('active'));
    document.querySelector('[data-filter="possession"][data-value="all"]').classList.add('active');
    ['costMin','costMax','keywordFilter','searchInput'].forEach(id=>{document.getElementById(id).value='';});
    document.getElementById('sortSelect').value='alpha-cost';
    document.getElementById('searchSuggestions').classList.remove('visible');
    render();
  });

  document.getElementById('btnDeselect').addEventListener('click',()=>{
    // Décocher toutes les factions, tous les types, le filtre Avatar
    // Garder : possession, coût, mot-clef, trier par
    state.perso=new Set();
    state.types=new Set();
    state.factions=new Set();
    state.page=1;
    // Visuellement : retirer la classe active de tous les toggles sauf possession
    document.querySelectorAll('[data-filter="perso"],[data-filter="type"],[data-filter="faction"]').forEach(b=>b.classList.remove('active'));
    render();
  });

  const si=document.getElementById('searchInput');
  si.addEventListener('input',e=>{state.search=e.target.value;updateSuggestions();state.page=1;render();});
  si.addEventListener('focus',()=>{if(state.search)updateSuggestions();});
  document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))document.getElementById('searchSuggestions').classList.remove('visible');});
  bindCollectionDetailClickHandler();

  document.getElementById('prevPage').addEventListener('click',()=>{if(state.page>1){state.page--;render();}});
  document.getElementById('nextPage').addEventListener('click',()=>{const t=Math.ceil(getFiltered().length/PER_PAGE);if(state.page<t){state.page++;render();}});

  // Modal
  document.getElementById('modalOverlay').addEventListener('click',e=>{
    if(e===lastCollectionDetailOpenEvent || Date.now()-lastCollectionDetailOpenAt<80){
      recordCollectionDetailTrace({closeHandlerInvoked:true,immediateCloseDetected:false,closeReason:'ignored-open-event'});
      return;
    }
    if(e.target===document.getElementById('modalOverlay'))closeCollectionDetail('overlay-click');
  });
  document.getElementById('modalClose').addEventListener('click',()=>closeCollectionDetail('close-button'));
  document.getElementById('modalLayout').addEventListener('click',e=>e.stopPropagation());
  document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('modalOverlay').classList.contains('open'))closeCollectionDetail('escape');});

  render();
}
